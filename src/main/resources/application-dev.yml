# ====== 开发环境配置 ======
spring:
  # 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/guooj
    username: root
    password: 1234
  # Redis
  redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  # session 30天
  session:
    timeout: 2592000
server:
  servlet:
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    # 开发环境打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rabbitmq:
  host: 127.0.0.1
  port: 5672
  username: guest
  password: guest
  virtual-host: /
  listener:
    simple:
      concurrency: 3          # 最小消费者数量
      max-concurrency: 10     # 最大消费者数量
      acknowledge-mode: manual # 手动确认
      prefetch: 1             # 每次只处理一个消息
# 代码沙箱 - 本地开发地址
codesandbox:
  url: http://localhost:8090/execute
  secret: aa77766654321cc
